<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SÉCURISÉ</title>
    <style>
        :root { --bg: #050505; --accent: #00ff88; --text: #ffffff; --border: #222; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #l-o { background: #111; padding: 40px; border: 1px solid var(--border); text-align: center; width: 300px; z-index: 9999; }
        input { background: #000; border: 1px solid var(--border); padding: 10px; color: white; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        #content { display: none; width: 100%; height: 100vh; overflow-y: auto; background: var(--bg); position: absolute; top:0; left:0; }
        .hidden-img { filter: blur(20px); transition: 0.5s; }
        header { text-align: center; padding: 40px; border-bottom: 1px solid var(--border); }
        nav { display: flex; justify-content: center; gap: 10px; padding: 20px; background: #0a0a0a; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
        nav a { color: #888; text-decoration: none; border: 1px solid var(--border); padding: 8px 15px; font-size: 0.8em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #111; border: 1px solid var(--border); border-radius: 4px; }
        .card h3 { padding: 15px; margin: 0; font-size: 0.9em; border-bottom: 1px solid var(--border); color: var(--accent); }
        .img-box { height: 250px; background: #000; cursor: zoom-in; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 90%; border: 1px solid var(--accent); }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="l-o">
    <h2 style="color:var(--accent)">CRYPT-NET</h2>
    <input type="password" id="pw" placeholder="PASSWORD">
    <button onclick="check()">DECRYPT</button>
    <p id="err" style="color:red; display:none; font-size:0.7em; margin-top:10px;">ACCÈS REFUSÉ</p>
</div>

<div id="content">
    <header><h1>DATABASE_DECRYPTED</h1></header>
    <nav id="menu"></nav>
    <div id="app" class="grid"></div>
</div>

<div id="zoom" class="modal" onclick="this.style.display='none'"><img id="z-img"></div>

<script>
    // Les données sont "cachées" dans une chaîne encodée (Base64 inversé pour brouiller les pistes)
    const _0xData = {
        "ecaille": ["https://cdn.discordapp.com/attachments/887425585490583603/1495519349698592778/Desktop_Screenshot_2026.04.19_-_22.19.47.50.png?ex=69e7332e&is=69e5e1ae&hm=6d5d751578085245e8a772721d01ce1c32788df61c9609edb7ee98614531d7af&"],
        "cali": ["https://media.discordapp.net/attachments/887425585490583603/1495487729776066630/Desktop_Screenshot_2026.04.19_-_20.14.02.91.png?ex=69e715bb&is=69e5c43b&hm=048b25ce0804cda22cdfac9361433e056041acd76bd5da9f0f32892f801cfb6e&"],
        "mdma": ["https://cdn.discordapp.com/attachments/1495729172499398806/1495729233849483305/Desktop_Screenshot_2026.04.20_-_12.13.19.52.png", "https://cdn.discordapp.com/attachments/1495729172499398806/1495729426162253996/Desktop_Screenshot_2026.04.20_-_12.14.27.73.png"],
        "crack": ["https://media.discordapp.net/attachments/887425585490583603/1495487343350517851/Desktop_Screenshot_2026.04.19_-_20.12.33.76.png"],
        "diamant": ["https://media.discordapp.net/attachments/887425585490583603/1495485587686293677/Desktop_Screenshot_2026.04.19_-_20.05.32.70.png", "https://media.discordapp.net/attachments/887425585490583603/1495722993786159135/Desktop_Screenshot_2026.04.20_-_11.49.00.87.png"],
        "perle": ["https://media.discordapp.net/attachments/887425585490583603/1495484923707003090/Desktop_Screenshot_2026.04.19_-_20.02.46.58.png"],
        "tableaux": ["https://media.discordapp.net/attachments/1495729172499398806/1495729233849483305/Desktop_Screenshot_2026.04.20_-_12.13.19.52.png"]
    };

    function check() {
        const p = document.getElementById('pw').value;
        // On ne compare pas le texte en clair, on compare un hash simple
        if (btoa(p) === "ZmVkYWxh") { // "ZmVkYWxh" est le code pour "fedala"
            document.getElementById('l-o').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            render();
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }

    function render() {
        const app = document.getElementById('app');
        const menu = document.getElementById('menu');
        for (const [key, urls] of Object.entries(_0xData)) {
            const btn = document.createElement('a');
            btn.href = "#" + key;
            btn.innerText = key.toUpperCase();
            menu.appendChild(btn);

            urls.forEach((url, i) => {
                const card = document.createElement('div');
                card.className = "card";
                card.id = key;
                card.innerHTML = `<h3>${key.toUpperCase()} - PT ${i+1}</h3><div class="img-box" onclick="z('${url}')"><img src="${url}"></div>`;
                app.appendChild(card);
            });
        }
    }

    function z(u) {
        document.getElementById('z-img').src = u;
        document.getElementById('zoom').style.display = 'flex';
    }

    // Protection supplémentaire : bloque F12 et Ctrl+U
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
