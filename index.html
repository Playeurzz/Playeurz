<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Skyland - By Playeurz</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --red-glow: #e60000;
            --red-soft: #b30000;
            --text: #ffffff;
            --input-bg: #151515;
            --border: #222;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            letter-spacing: 0.5px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            /* Lueur adoucie pour le confort visuel */
            text-shadow: 0 2px 10px rgba(230, 0, 0, 0.5);
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 4px;
            margin-top: -5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .inputs-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 0.8rem;
            color: var(--red-soft);
            text-transform: uppercase;
            font-weight: 700;
            text-align: center;
        }

        input {
            background: var(--input-bg);
            border: 2px solid #222;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            outline: none;
            transition: 0.3s;
            text-align: center;
            width: 120px;
        }

        input:focus {
            border-color: var(--red-soft);
            background: #1c1c1c;
        }

        .section-title {
            font-size: 0.9rem;
            border-left: 3px solid var(--red-soft);
            padding-left: 15px;
            margin-bottom: 20px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        button {
            background: #111;
            color: #bbb;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
        }

        button:hover {
            background: var(--red-soft);
            color: #fff;
            border-color: var(--red-glow);
            box-shadow: 0 5px 15px rgba(230, 0, 0, 0.3);
            transform: translateY(-3px);
        }

        #result-panel {
            position: sticky;
            bottom: 30px;
            background: #000;
            border: 2px solid var(--red-soft);
            padding: 25px;
            border-radius: 15px;
            margin-top: 40px;
            display: none;
            box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.9), 0 0 20px rgba(230, 0, 0, 0.2);
            text-align: center;
        }

        .cmd-label { 
            font-size: 0.8rem; 
            color: #555; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .cmd-value { 
            font-family: 'Consolas', monospace; 
            color: #fff; 
            font-size: 1.3rem; 
            font-weight: 700;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #333;
        }

        .copy-status { 
            color: #00ff66; 
            font-size: 0.9rem; 
            margin-top: 15px; 
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PANEL SKYLAND</h1>
        <div class="subtitle">By Playeurz</div>
    </div>

    <div class="inputs-area">
        <div class="input-group">
            <label>ID JOUEUR</label>
            <input type="number" id="pId" placeholder="ID">
        </div>
        <div class="input-group">
            <label>NIVEAU WARN</label>
            <input type="number" id="wLvl" value="1" min="1" max="5">
        </div>
    </div>

    <div class="section-title">Infractions Standard</div>
    <div class="grid" id="mainGrid"></div>

    <div class="section-title">Cas Particuliers</div>
    <div class="grid" id="specGrid"></div>

    <div id="result-panel">
        <div class="cmd-label">Commande générée et copiée :</div>
        <div class="cmd-value" id="cmdOut"></div>
        <div class="copy-status">✅ PRÊT À ÊTRE COLLÉ (CTRL + V)</div>
    </div>
</div>

<script>
    const data = [
        { n: "HRP", p: ["25", "40", "55", "70", "100"], r: "Action Hors RP" },
        { n: "Spam", p: ["25", "40", "55", "70", "100"], r: "Spam chat / micro" },
        { n: "Abandon Scene", p: ["30", "45", "60", "75", "100"], r: "Abandon de scene" },
        { n: "Refus Scene", p: ["30", "45", "60", "75", "100"], r: "Refus de scene" },
        { n: "Copbait", p: ["15", "30", "45", "60", "100"], r: "Copbait / Provoc" },
        { n: "Freepunch", p: ["15", "30", "45", "60", "100"], r: "Free punch" },
        { n: "Freekill", p: ["60", "75", "90", "105", "120"], r: "Freekill" },
        { n: "Car Kill", p: ["60", "75", "90", "105", "120"], r: "Carkill gratuit" },
        { n: "RDM", p: ["60", "75", "90", "105", "120"], r: "RDM" },
        { n: "Powergaming", p: ["30", "45", "60", "75", "100"], r: "Powergaming" },
        { n: "Metagaming", p: ["20", "40", "60", "80", "Ban 12h"], r: "metagaming" },
        { n: "No Fear", p: ["45", "60", "75", "100", "Ban 12h"], r: "Non respect du Fear" },
        { n: "No Pain", p: ["45", "60", "75", "100", "Ban 12h"], r: "Non respect du Pain" },
        { n: "Fail RP", p: ["20", "35", "50", "70", "100"], r: "Fail RP" },
        { n: "Otage Mal Géré", p: ["20", "35", "50", "70", "100"], r: "Mauvais RP otage" },
        { n: "Braquage Ville", p: ["45", "60", "80", "110", "Ban 12h"], r: "Braquage zone de masse rp" },
        { n: "Tir sur Police", p: ["90", "110", "130", "150", "Ban 12h"], r: "Tir sur la Police" },
        { n: "Tir sur EMS", p: ["90", "110", "130", "150", "Ban 12h"], r: "Tir sur les EMS" },
        { n: "Glitch", p: ["50", "75", "90", "120", "Ban 24-72h"], r: "Glitch / Exploit bug" },
        { n: "Insultes HRP", p: ["25", "45", "60", "120", "Ban 12h"], r: "Insultes Hors RP" },
        { n: "Insultes Staff", p: ["200", "230", "260", "290", "Ban 12h"], r: "Manque de respect Staff" },
        { n: "Streamsniping", p: ["30", "60", "90", "120", "Ban 48h"], r: "Streamsniping" },
        { n: "Cheat", p: ["Ban 48h", "Ban 72h", "Ban 7j", "Ban 14j", "Ban perm"], r: "Utilisation de cheat" },
        { n: "Duplication", p: ["Ban 48h", "Ban 72h", "Ban 7j", "Ban 14j", "Ban perm"], r: "Duplication d'items" }
    ];

    const specials = [
        { n: "Descente sans ticket", d: "200", r: "Descente non autorisee" },
        { n: "Alt + F4 en scene", d: "260", r: "Alt+F4 en scene" },
        { n: "Propos Graves", d: "Ban direct", r: "Propos discriminatoires" }
    ];

    const mG = document.getElementById('mainGrid');
    const sG = document.getElementById('specGrid');

    data.forEach(s => {
        let b = document.createElement('button');
        b.innerText = s.n;
        b.onclick = () => gen(s.p, s.r, true);
        mG.appendChild(b);
    });

    specials.forEach(s => {
        let b = document.createElement('button');
        b.innerText = s.n;
        b.onclick = () => gen(s.d, s.r, false);
        sG.appendChild(b);
    });

    function gen(pals, rClean, isN) {
        const id = document.getElementById('pId').value || "0";
        const lvl = document.getElementById('wLvl').value || 1;
        let cmd = "";

        if(isN) {
            let idx = Math.max(0, Math.min(lvl - 1, 4));
            let d = pals[idx];
            let type = d.includes("Ban") ? "/ban" : "/jail";
            cmd = `${type} ${id} ${d} "${rClean} - Warn ${lvl}"`;
        } else {
            let type = pals.includes("Ban") ? "/ban" : "/jail";
            let d = (pals === "Ban direct") ? "24h" : pals;
            cmd = `${type} ${id} ${d} "${rClean}"`;
        }

        document.getElementById('cmdOut').innerText = cmd;
        document.getElementById('result-panel').style.display = 'block';
        navigator.clipboard.writeText(cmd);
    }
</script>

</body>
</html>
